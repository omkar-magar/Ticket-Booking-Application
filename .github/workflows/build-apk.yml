name: Build Android APK

# Build the APK on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    # Pin to 22.04 — Buildozer / python-for-android are well-tested here and
    # avoid the libtinfo5 / ncurses issues seen on ubuntu-24.04 (ubuntu-latest).
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        # The latest Android sdkmanager/build-tools require Java 17. Make it the
        # active JDK (the runner default was Java 11, causing
        # UnsupportedClassVersionError: class file version 61.0).
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Pre-install Android SDK with build-tools 33.0.2 (provides aidl)
        run: |
          # No 'pipefail': `yes | sdkmanager` makes `yes` die with SIGPIPE
          # (non-zero) once sdkmanager closes the pipe, which would otherwise
          # abort the whole step even though sdkmanager succeeded.
          set -eux
          # Android build-tools >= 34 removed the `aidl` binary. Buildozer always
          # uses the HIGHEST installed build-tools version (no config to pin it),
          # so we install ONLY 33.0.2 (last version that ships aidl) into the SDK
          # dir Buildozer uses, accepting licenses non-interactively.
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          rm -f cmdtools.zip
          rm -rf latest
          mv cmdline-tools latest
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          # Accept licenses, then install packages (yes | on BOTH commands so the
          # per-package license prompt is auto-accepted — this was the bug before).
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-34" "build-tools;33.0.2"
          # Guarantee 33.0.2 is the highest (only) build-tools present.
          ls "$ANDROID_SDK_ROOT/build-tools"
          find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 1 -mindepth 1 -type d \
            ! -name '33.0.2' -exec rm -rf {} +
          # Buildozer looks for sdkmanager at the legacy $SDK/tools/bin path.
          # Symlink it to cmdline-tools/latest so that path resolves if used.
          ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools/latest" "$ANDROID_SDK_ROOT/tools"
          # Fail loudly if aidl is still missing.
          test -x "$ANDROID_SDK_ROOT/build-tools/33.0.2/aidl"
          echo "$ANDROID_SDK_ROOT/build-tools/33.0.2" >> "$GITHUB_PATH"

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: amg-apk
          path: bin/*.apk
          if-no-files-found: error
