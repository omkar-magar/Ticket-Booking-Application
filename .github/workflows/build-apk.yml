name: Build Android APK

# Build the APK on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    # Pin to 22.04 — Buildozer / python-for-android are well-tested here and
    # avoid the libtinfo5 / ncurses issues seen on ubuntu-24.04 (ubuntu-latest).
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Pre-install Android SDK with build-tools 33.0.2 (provides aidl)
        run: |
          # Android build-tools >= 34 removed the `aidl` binary, which makes
          # Buildozer/p4a fail with "Aidl not found". We populate Buildozer's
          # SDK directory ourselves with build-tools 33.0.2 (last with aidl)
          # so it is the version p4a picks up.
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          rm -f cmdtools.zip
          mv cmdline-tools latest
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-34" "build-tools;33.0.2"
          # Make sure aidl is discoverable on PATH as well.
          echo "$ANDROID_SDK_ROOT/build-tools/33.0.2" >> "$GITHUB_PATH"

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: amg-apk
          path: bin/*.apk
          if-no-files-found: error
